name: pbmc-fcs-batch-correction
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  - python=3.11
  - r-base=4.3.3
  
  # Core Build Tools
  - compilers
  - make
  - pkg-config
  
  # System Libraries & Security Certificates
  - ca-certificates
  - openssl
  - libxml2
  - libcurl
  - icu
  - libpng
  - xorg-libx11
  
  # R Infrastructure
  - r-tidyverse
  - r-devtools
  - r-biocmanager
  - r-pak
  - r-remotes
  
  # Pre-compiled Bioconductor Dependencies
  - bioconductor-singlecellexperiment
  - bioconductor-summarizedexperiment
  - bioconductor-biobase
  - bioconductor-flowcore
  - bioconductor-peacoqc
  - bioconductor-flowdensity
  - bioconductor-flowsom
  - bioconductor-sva
  - bioconductor-limma
  - bioconductor-complexheatmap
  - bioconductor-genomeinfodbdata
  - bioconductor-rtracklayer
  - bioconductor-zlibbioc
  - bioconductor-scater
  
  # R CRAN Dependencies as Binaries
  - r-kohonen
  - r-data.table
  - r-matrix
  - r-rcpp
  - r-rcpparmadillo
  - r-stringi
  - r-xml2
  - r-curl
  - r-png
  - r-writexl
  - r-vegan
  - r-patchwork