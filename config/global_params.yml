# ==============================================================================
# CONFIGURATION: PBMC BATCH CORRECTION
# ==============================================================================

project_id: "PBMC_105_Correction"
random_seed: 42
n_cores: 4

parallel:
  n_workers: null        # null = auto-detect (min of n_cores and detectCores()-1)
  sequential_debug: false  # override via env var PIPELINE_SEQUENTIAL=1

# Directory Structure
directories:
  raw:
    pannelli_liquidi: "/mnt/h/Drive condivisi/MATERIALE LABORATORIO/FILE FCS/DAVIDE/pannelli_liquidi"
    ds_old: "/mnt/h/Drive condivisi/MATERIALE LABORATORIO/FILE FCS/DAVIDE/pannelli_liquidi/DS old"
    duraclone: "/mnt/h/Drive condivisi/MATERIALE LABORATORIO/FILE FCS/DAVIDE/duraclone"
  raw_filters:
    pannelli_liquidi: "^\\[TEX\\]"   # restrict to TEX-panel files only
  exclude_files:
    duraclone:
      - "DS004 TEX1.fcs"   # confirmed outlier: CD3 threshold 0.793 arcsinh, different MFI scale
      - "DS005 TEX2.fcs"   # confirmed outlier: same acquisition problem as DS004
  intermediate: "results/intermediate"
  processed: "results/processed"
  figures: "results/figures"
  logs: "results/logs"
  integration: "results/integration"

testing:
  enabled: false
  max_files_per_panel: 30

# Marker Configuration
markers:
  # Transformation cofactor (Arcsinh: asinh(x / cofactor))
  transform_cofactor: 150

  # Technical channels to strictly exclude from the shared marker intersection
  # These are not biological markers and should not be used for clustering/correction
  # Viability dye — used only for dead cell gating in Step 02, never for clustering
  viability_channel: "VIAKROME"

  exclude_channels:
    - "Time"
    - "Event_length"
    - "FSC-A"
    - "FSC-H"
    - "FSC-W"
    - "SSC-A"
    - "SSC-H"
    - "SSC-W"
    - "Width"
    - "Cell_length"
    - "VIAKROME"
    
qc:
  enabled: true

  peacoqc:
    enabled: true
    MAD: 6
    IT_limit: 0.8
    remove_zeros: false
    min_cells: 150
    max_pct_per_step: 0.60          # Trigger retry if PeacoQC removes > 60% of events
    retry_IT_limit_step: 0.1        # Add this to IT_limit on retry

  singlet:
    enabled: true
    slope_sd_multiplier: 2.5

  debris:
    enabled: true
    fsc_min_quantile: 0.03
    ssc_max_quantile: 0.98

  viability:
    enabled: true
    channel: "VIAKROME"        
    max_sd_multiplier: 2.5       

  max_pct_removed: 85
  min_cells_final: 5000

cd3_gate:
  enabled: true             # Restrict SCE to CD3+ T cells before clustering
  uninformative_gap: 1.0    # Min arcsinh gap between k-means centers; below this uses fallback
  fallback_threshold: 4.0   # arcsinh CD3 threshold when k-means gap is too small
  min_cd3_pct: 10.0         # Warn (not error) if < 10% of sample cells pass CD3 gate
  min_threshold: 1.5        # Auto-exclude sample if k-means CD3 threshold < this value;
                            # DS004 threshold=0.793 → excluded; legit low-lot samples 1.7–1.9 → pass

cd8_gate:
  enabled: false            # DISABLED: CD8 MFI is instrument-specific (Assay Effect) — per-sample
                            # k-means gives thresholds 6.5-7.7 arcsinh in duraclone vs ~5.0 in PL,
                            # excluding most cells in the CD8-exhaustion panel. Not recoverable
                            # without MFI correction (which we deliberately avoid).
  uninformative_gap: 1.0
  fallback_threshold: 3.5
  min_cd8_pct: 10.0

correction:
  xdim: 10
  ydim: 10
  rlen: 30
  norm_method: "rank"
  seed: 1234
    
clustering:
  xdim: 10
  ydim: 10
  n_metaclusters: 20
  seed: 1234
  run_per_batch: true
  consensus:
    reps: 100        # ConsensusClusterPlus resampling iterations
    pItem: 0.9       # fraction of items resampled per iteration
    pFeature: 1.0    # fraction of features resampled per iteration

integration:
  method: "random_effects"
  min_samples_per_batch: 3
  similarity_threshold: 0.70
  n_bootstrap: 1000
  max_marker_delta_arcsinh: 2.0   # delta_pass = TRUE if max per-marker |Δ| < this threshold
  max_population_freq_warning: 0.40  # Warn if mean_freq > 40% in any (batch, population)
  jsd_pass_threshold: 0.1        # JSD < this value is considered a passing match (legacy metric)
  
auto_phenotyping:
  enabled: true
  uninformative_gap: 0.5          # Min k-means center separation to consider a marker informative
  low_reliability_threshold: 0.30 # Append "[low confidence]" when reliability < this value
  kmeans:
    nstart: 10     # number of random restarts for 1D k-means
    iter_max: 50   # maximum iterations per k-means run
  marker_min_thresholds:          # Per-marker floor for k-means threshold (arcsinh units)
    KI67: 6.5                     # All observed centroids are 4.8-6.2; floor at 6.5 suppresses
                                  # the (Proliferating) tag universally — KI67 staining appears
                                  # non-specifically high across all populations in both panels
    PD1:   8.0                    # pannelli_liquidi centroid max = 7.705; floor suppresses widespread
                                  # (Exhausted) tagging (same saturation mechanism as KI67)
    CD137: 7.0                    # pannelli_liquidi centroid max = 6.343; floor suppresses
                                  # (Activated) tagging universally

scoring:
  run_patient_scoring: true
  z_score_threshold: 2.0  # Clinical standard for 95% confidence interval

dimred:
  n_neighbors: 15
  min_dist: 0.1
  seed: 1234
  max_cells: 100000  # stratified downsampling cap before UMAP (per-batch)
  figure:
    width_single: 8        # width (inches) for single-variable UMAP PDFs
    height_single: 6
    width_comparison: 12   # width for split/faceted UMAP PDFs
    height_comparison: 6
    width_matched: 11      # width for matched-population single-batch UMAPs
    height_matched: 8
    width_per_panel: 9     # width per panel for batch-comparison UMAPs

batch_labels:
  ds_old: "pannelli_liquidi"   # merge DS old into the same batch as TEX pannelli

# Manual population labels (override auto-phenotyping).
# Assigned by centroid inspection (run 2026-05-08 artifacts).
# Lineage: CD3/CD8/CD45RA/CCR7/CD28. KI67/PD1/CD137 omitted (unreliable at current n).
# Re-verify after any re-clustering (new seed, n, or grid size).
population_labels:
  pop_1:  "Central Memory CD8+ T cell"
  pop_2:  "Naive CD8+ T cell"
  pop_3:  "Effector-like CD8+ T cell"
  pop_4:  "Transitional CD8+ T cell"
  pop_5:  "CD8+ T cell (CD3dim)"
  pop_6:  "Naive CD8+ T cell (CD28+)"
  pop_7:  "Non-T cell (NK/Monocyte)"
  pop_8:  "Non-T cell"
  pop_9:  "CD8+ T cell (CD45RA+ CD28+)"
  pop_10: "CD8+ T cell (CD3dim in duraclone)"
  pop_11: "Naive CD4+ T cell (freq paradox)"
  pop_12: "TEMRA CD8+ T cell"
  pop_13: "Unresolved (freq paradox)"
  pop_14: "Unresolved"
  pop_15: "Dim/Debris population"
  pop_16: "Unresolved"
  pop_17: "Unresolved"
  pop_18: "Unresolved"
  pop_19: "Naive CD8+ T cell (batch-discordant)"
  pop_20: "Unresolved"

EOF: TRUE
