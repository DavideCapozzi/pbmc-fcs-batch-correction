
# ## Installation

# 1. Create the environment:
#    ```bash
#    micromamba create -f env/environment.yml
#    micromamba activate pbmc-fcs-batch-correction
# Install custom packages:

# Bash
# Rscript -e "remotes::install_github('biosurf/cyCombine', upgrade = 'never')"

# ==============================================================================
# CONFIGURATION: PBMC BATCH CORRECTION
# ==============================================================================

project_id: "PBMC_105_Correction"
random_seed: 42
n_cores: 4

# Directory Structure
directories:
  raw:
    pannelli_liquidi: "/mnt/h/Drive condivisi/MATERIALE LABORATORIO/FILE FCS/DAVIDE/pannelli_liquidi"
    duraclone: "/mnt/h/Drive condivisi/MATERIALE LABORATORIO/FILE FCS/DAVIDE/duraclone"
  intermediate: "results/intermediate"
  processed: "results/processed"
  figures: "results/figures"
  logs: "results/logs"
  integration: "results/integration"

testing:
  enabled: true
  max_files_per_panel: 3

# Marker Configuration
markers:
  # Transformation cofactor (Arcsinh: asinh(x / cofactor))
  transform_cofactor: 150

  # Technical channels to strictly exclude from the shared marker intersection
  # These are not biological markers and should not be used for clustering/correction
  exclude_channels:
    - "Time"
    - "Event_length"
    - "FSC-A"
    - "FSC-H"
    - "FSC-W"
    - "SSC-A"
    - "SSC-H"
    - "SSC-W"
    - "Width"
    - "Cell_length"
    
correction:
  xdim: 10
  ydim: 10
  rlen: 30
  norm_method: "rank"
  seed: 1234
    
clustering:
  xdim: 10
  ydim: 10
  n_metaclusters: 20
  seed: 1234
  run_per_batch: true

integration:
  min_samples_per_batch: 3
  similarity_threshold: 0.70
  cv_flag_threshold: 1.5

# Biological population annotation (optional).
# Review the "Centroids" sheet in stratified_baseline_report.xlsx to identify
# each population by its marker expression profile, then fill in the names.
# When populated, a "population_name" column is added to StratifiedBaseline.
# population_labels:
#   pop_1:  ""
#   pop_2:  ""
#   pop_3:  ""
#   pop_4:  ""
#   pop_5:  ""
#   pop_6:  ""
#   pop_7:  ""
#   pop_8:  ""
#   pop_9:  ""
#   pop_10: ""
#   pop_11: ""
#   pop_12: ""
#   pop_13: ""
#   pop_14: ""
#   pop_15: ""
#   pop_16: ""
#   pop_17: ""
#   pop_18: ""
#   pop_19: ""

dimred:
  n_neighbors: 15
  min_dist: 0.1
  seed: 1234

EOF: TRUE
